<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Analyser</title>
    <meta name="description" content="SQL static analysis engine — NOLOCK scan and procedure optimisation">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <div class="app-container">
        <header class="navbar">
            <div class="logo-container">
                <div class="logo-icon"><i class="fa-solid fa-database"></i></div>
                <div class="logo-text">
                    <h1>SQL <span class="highlight-sky">ANALYSER</span></h1>
                    <p class="tagline">SQL Static Analysis Engine</p>
                </div>
            </div>
            <div class="system-status">
                <span class="pulse"></span>
                <span class="status-text">SYSTEM <span class="highlight-green">ONLINE</span></span>
            </div>
        </header>

        <main class="main-content">

            <!-- LEFT: SQL Editor -->
            <section class="glass-panel input-section">
                <div class="panel-header">
                    <h2><i class="fa-solid fa-code"></i> SQL</h2>
                    <div class="panel-actions">
                        <input type="file" id="sql-file" accept=".sql,.txt" style="display:none;">
                        <label for="sql-file" class="btn-upload"><i class="fa-solid fa-file-import"></i> UPLOAD</label>
                    </div>
                </div>

                <form id="analyzer-form">
                    <div class="form-group dialect-group">
                        <label for="sql-dialect">[ Dialect ]</label>
                        <select id="sql-dialect" required>
                            <option value="" disabled selected>Select Dialect...</option>
                            <option value="T-SQL">T-SQL</option>
                            <option value="DB2">IBM DB2</option>
                            <option value="PostgreSQL">PostgreSQL</option>
                            <option value="MySQL">MySQL</option>
                            <option value="Oracle">Oracle</option>
                            <option value="SQLite">SQLite</option>
                        </select>
                    </div>

                    <!-- Mode Tabs -->
                    <div class="mode-tabs">
                        <button type="button" class="mode-tab active" id="tab-nolock" onclick="setMode('nolock')">
                            <i class="fa-solid fa-lock-open"></i> NOLOCK SCAN
                        </button>
                        <button type="button" class="mode-tab" id="tab-optimise" onclick="setMode('optimise')">
                            <i class="fa-solid fa-bolt"></i> OPTIMISE
                        </button>
                        <button type="submit" class="btn-scan" id="scan-btn">
                            <span class="btn-content"><i class="fa-solid fa-radar"></i> SCAN</span>
                        </button>
                    </div>

                    <div class="form-group editor-group">
                        <div class="editor-container">
                            <div id="lineNumbers" class="line-numbers"><div>1</div></div>
                            <textarea id="sqlInput" wrap="off" spellcheck="false"
                                placeholder="-- Paste or upload SQL here...&#10;SELECT * FROM dbo.Users;"></textarea>
                        </div>
                    </div>
                </form>
            </section>

            <!-- RIGHT: Analysis Report -->
            <section class="glass-panel output-section">
                <div class="panel-header">
                    <h2 id="report-title"><i class="fa-solid fa-lock-open"></i> NOLOCK REPORT</h2>
                    <span id="missing-badge" class="missing-badge" style="display:none;"></span>
                </div>
                <div class="terminal-window">
                    <div class="terminal-header">
                        <span class="dot dot-red"></span>
                        <span class="dot dot-yellow"></span>
                        <span class="dot dot-green"></span>
                        <span class="terminal-label" id="terminal-label">sql_analyser.exe — nolock_mode</span>
                    </div>
                    <div class="terminal-body" id="terminal-output">
                        <div class="sys-msg">&gt; SQL Analyser awaiting payload...</div>
                        <div class="sys-msg blink-cursor">_</div>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
