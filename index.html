<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOLOCK Analyser // Anti-Gravity SQL Scan</title>
    <meta name="description" content="Elite SQL static analysis engine with anti-gravity precision">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="particle-layer" id="particles-js"></div>
        
        <header class="navbar">
            <div class="logo-container">
                <img src="assets/logo.png" alt="NOLOCK Analyser Logo" class="logo-img">
                <div class="logo-text">
                    <h1>NOLOCK <span class="highlight-cyan">ANALYSER</span></h1>
                    <p class="tagline">Elite SQL Static Analysis Engine</p>
                </div>
            </div>
            <div class="system-status">
                <span class="pulse"></span>
                <span class="status-text">ALWIN IS <span class="highlight-green">ANALYSING</span></span>
            </div>
        </header>

        <main class="main-content">
            
            <!-- Left Column: Input Form -->
            <section class="glass-panel input-section">
                <div class="panel-header">
                    <h2><i class="fa-solid fa-code"></i> TARGET PARAMETERS</h2>
                    <div class="panel-header-actions">
                        <input type="file" id="sql-file" accept=".sql,.txt" style="display:none;">
                        <label for="sql-file" class="btn-upload"><i class="fa-solid fa-file-import"></i> UPLOAD FILE</label>
                        <button type="submit" class="btn-scan" id="scan-btn" form="analyzer-form">
                            <span class="btn-content"><i class="fa-solid fa-radar"></i> SCAN</span>
                        </button>
                    </div>
                </div>
                <form id="analyzer-form">
                    <div class="form-group dialect-group">
                        <label for="sql-dialect">[ SQL Dialect ]</label>
                        <div class="select-wrapper">
                            <select id="sql-dialect" required>
                                <option value="" disabled selected>Select Dialect...</option>
                                <option value="T-SQL">T-SQL</option>
                                <option value="DB2">IBM DB2</option>
                                <option value="PostgreSQL">PostgreSQL</option>
                                <option value="MySQL">MySQL</option>
                                <option value="Oracle">Oracle</option>
                                <option value="SQLite">SQLite</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group editor-group">
                        <label>[ SQL Payload ]</label>
                        <!-- Code editor: hidden textarea + visible rendered lines -->
                        <div class="code-editor" id="code-editor">
                            <div class="code-gutter" id="code-gutter"></div>
                            <div class="code-lines" id="code-lines">
                                <div class="code-line" data-line="1"><span class="line-content"></span></div>
                            </div>
                            <!-- Hidden real textarea that captures typing -->
                            <textarea id="sql-script" class="sql-hidden-textarea" wrap="off" spellcheck="false" required
                                      placeholder="-- Paste or upload your SQL here...&#10;SELECT * FROM dbo.Users;"></textarea>
                        </div>
                    </div>
                </form>
            </section>

            <!-- Right Column: Results -->
            <section class="glass-panel output-section">
                <div class="panel-header">
                    <h2><i class="fa-solid fa-terminal"></i> ANALYSIS REPORT</h2>
                    <span id="missing-badge" class="missing-badge" style="display:none;">0 MISSING</span>
                </div>
                <div class="terminal-window" id="terminal-window">
                    <div class="terminal-header">
                        <span class="dot dot-red"></span>
                        <span class="dot dot-yellow"></span>
                        <span class="dot dot-green"></span>
                        <span class="terminal-label">nolock_analyser.exe</span>
                    </div>
                    <div class="terminal-body" id="terminal-output">
                        <div class="sys-msg">&gt; NOLOCK Analyser awaiting payload...</div>
                        <div class="sys-msg blink-cursor">_</div>
                    </div>
                </div>
            </section>

        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
